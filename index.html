<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Photogram Pro Max</title>
<style>
body{margin:0;font-family:Arial;background:#fafafa;transition:.4s}
body.dark{background:#121212;color:#fff}

.page{display:none;justify-content:center;align-items:center;height:100vh}
.fade-in{animation:fade .5s}
@keyframes fade{from{opacity:0}to{opacity:1}}

/* HOME */
.home{display:flex;flex-direction:column;justify-content:center;align-items:center;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;text-align:center}
.home h1{font-size:60px;margin:0}
.home p{margin:10px 0 20px}
.home button{padding:12px 25px;border:none;border-radius:8px;background:white;cursor:pointer}

/* LOGIN */
.login-page{flex-direction:column;background:linear-gradient(135deg,#ff9a9e,#fad0c4)}
.auth-box{background:#fff;padding:30px;border-radius:15px;box-shadow:0 5px 20px rgba(0,0,0,0.2)}
.auth-box input{display:block;margin:10px 0;padding:10px;width:220px}
.auth-box button{margin:5px;padding:10px 15px}

/* MAIN APP */
#mainApp{flex-direction:column;height:auto}
header{position:sticky;top:0;background:#fff;padding:15px;border-bottom:1px solid #ddd;text-align:center}
body.dark header{background:#1e1e1e}

.logo{font-size:26px;font-weight:bold;background:linear-gradient(45deg,#ff512f,#dd2476);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.container{max-width:600px;margin:20px auto}
.post{background:#fff;margin-bottom:20px;border-radius:15px;padding:15px;box-shadow:0 4px 15px rgba(0,0,0,0.1)}
body.dark .post{background:#1e1e1e}
.post img,.post video{width:100%;border-radius:10px}

.privacy{font-size:12px;color:#ccc;margin-top:15px}

.top-bar{display:flex;justify-content:space-between;align-items:center}
.logout-btn{background:red;color:white;border:none;padding:6px 10px;border-radius:5px;cursor:pointer}

</style>
</head>
<body>

<!-- HOME PAGE -->
<div id="homePage" class="page home fade-in" style="display:flex">
<h1>📸 Photogram</h1>
<p>Share your photos, videos & moments</p>
<button onclick="goLogin()">Get Started</button>
<div class="privacy">🔒 Privacy Protected | Login Required | Your data stays in your device</div>
</div>

<!-- LOGIN PAGE -->
<div id="loginPage" class="page login-page">
<div class="auth-box">
<h2>Sign In</h2>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>
<p class="privacy">🔐 Secure Login System (Frontend Demo)</p>
</div>
</div>

<!-- MAIN APP (FEED PAGE) -->
<div id="mainApp" class="page">
<header>
<div class="top-bar">
<span class="logo">📸 Photogram</span>
<div>
<button onclick="toggleDarkMode()">🌙</button>
<button class="logout-btn" onclick="logout()">Logout</button>
</div>
</div>
</header>

<div class="container">

<div id="uploadSection">
<input type="file" id="fileInput" accept="image/*,video/*">
<button onclick="uploadPost()">Upload</button>
</div>

<div id="feed"></div>

</div>
</div>

<script>
// FIX: get elements properly
const homePage = document.getElementById('homePage');
const loginPage = document.getElementById('loginPage');
const mainApp = document.getElementById('mainApp');
const username = document.getElementById('username');
const password = document.getElementById('password');
const fileInput = document.getElementById('fileInput');
const feed = document.getElementById('feed');
let currentUser=localStorage.getItem('user')||"";
let users=JSON.parse(localStorage.getItem('users'))||{};
let posts=JSON.parse(localStorage.getItem('posts'))||[];

function save(){
localStorage.setItem('users',JSON.stringify(users));
localStorage.setItem('posts',JSON.stringify(posts));
localStorage.setItem('user',currentUser);
}

function goLogin(){
 homePage.style.display='none';
 loginPage.style.display='flex';
}

function signup(){
if(!username.value||!password.value)return alert('Enter details');
if(users[username.value]) return alert('User exists');
users[username.value]=password.value;
save();
alert('Signup done');
}

function login(){
if(users[username.value]===password.value){
currentUser=username.value;
save();
loginPage.style.display='none';
mainApp.style.display='flex';
render();
}else alert('Wrong password');
}

function logout(){
currentUser="";
save();
location.reload();
}

function uploadPost(){
if(!currentUser)return alert('Login first');
let f=fileInput.files[0];
if(!f)return;
let r=new FileReader();
r.onload=e=>{
posts.unshift({user:currentUser,file:e.target.result,likes:0,date:new Date().toLocaleString()});
save();
render();
};
r.readAsDataURL(f);
}

function daysAgo(dateStr){
 const postDate=new Date(dateStr);
 const now=new Date();
 const diff=Math.floor((now-postDate)/(1000*60*60*24));
 return diff===0?"Today":diff+" days ago";
}

function render(){
 feed.innerHTML='';
 posts.forEach(p=>{
  feed.innerHTML+=`<div class='post'>
  <b>${p.user}</b><br>
  <small>${p.date} • ${daysAgo(p.date)}</small><br>
  ${p.file.includes('video')?`<video controls src='${p.file}'></video>`:`<img src='${p.file}'>`}
  <br>❤️ ${p.likes}
  </div>`;
 });
}

function toggleDarkMode(){
 document.body.classList.toggle('dark');
}

</script>


<!-- PROFILE PAGE -->
<div id="profilePage" class="page">
  <header>
    <div class="top-bar">
      <span class="logo">👤 Profile</span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </header>
  <div class="container" style="text-align:center">
    <h2 id="profileName"></h2>
    <p>Your posts</p>
    <div id="profilePosts"></div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div id="bottomNav" style="position:fixed;bottom:0;left:0;width:100%;background:#fff;border-top:1px solid #ddd;display:flex;justify-content:space-around;padding:10px 0;">
  <button onclick="goHome()">🏠 Home</button>
  <button onclick="goProfile()">👤 Profile</button>
</div>

<script>
function goHome(){
  mainApp.style.display='flex';
  profilePage.style.display='none';
}

function goProfile(){
  mainApp.style.display='none';
  profilePage.style.display='flex';
  loadProfile();
}

function loadProfile(){
  document.getElementById('profileName').innerText=currentUser;
  const container=document.getElementById('profilePosts');
  container.innerHTML='';
  posts.filter(p=>p.user===currentUser).forEach(p=>{
    container.innerHTML+=`<div class='post'>
    ${p.file.includes('video')?`<video controls src='${p.file}'></video>`:`<img src='${p.file}'>`}
    <br>❤️ ${p.likes}
    </div>`;
  });
}
</script>

</body>
</html>
